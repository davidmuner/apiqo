<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Pink → Cyan gradient across the wave dumbbell -->
    <linearGradient id="wg" x1="7" y1="21" x2="22" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E91E8C"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <!-- Cyan → Blue gradient across the large pill (unrotated space) -->
    <linearGradient id="pg" x1="16" y1="11" x2="28" y2="11" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#1E90FF"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0D0D1A"/>

  <!-- Small pink dot (far left) -->
  <circle cx="5" cy="21" r="2" fill="#E91E8C"/>

  <!-- Wave dumbbell shape: stadium from left circle to right circle, pink→cyan -->
  <path d="M10,18 L19,18 A3,3,0,0,1,19,24 L10,24 A3,3,0,0,1,10,18 Z" fill="url(#wg)"/>

  <!-- Large tilted pill: cyan→blue, rotated -42° around its center -->
  <rect x="16" y="8.5" width="12" height="5" rx="2.5" fill="url(#pg)"
        transform="rotate(-42 22 11)"/>
</svg>
